    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; border-radius: 12px; margin-bottom: 30px; }
    h1 { font-size: 2.5em; margin-bottom: 10px; }
    .subtitle { opacity: 0.9; font-size: 1.1em; }
    .search-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 30px; }
    .search-input { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid #e0e0e0; border-radius: 8px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: #667eea; }
    .filters { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; background: #f0f0f0; transition: all 0.2s; }
    .filter-btn:hover { background: #e0e0e0; }
    .filter-btn.active { background: #667eea; color: white; }
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .agent-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
    .agent-card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
    .agent-name { font-size: 1.4em; font-weight: 600; color: #333; margin-bottom: 8px; }
    .agent-category { display: inline-block; padding: 4px 12px; background: #f0f0f0; border-radius: 12px; font-size: 12px; color: #666; margin-bottom: 12px; }
    .agent-description { color: #666; font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
    .agent-stats { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid #f0f0f0; }
    .stat { text-align: center; }
    .stat-value { font-weight: 600; color: #333; }
    .stat-label { font-size: 12px; color: #999; }
    .market-cap { color: #667eea; }
    .view-profile { display: inline-block; margin-top: 15px; padding: 8px 16px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; font-size: 14px; transition: background 0.2s; }
    .view-profile:hover { background: #5568d3; }
    footer { margin-top: 40px; padding: 20px; text-align: center; color: #666; font-size: 14px; }
    .stats-bar { display: flex; justify-content: space-around; background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .stat-item { text-align: center; }
    .stat-number { font-size: 2em; font-weight: 700; color: #667eea; }
    .stat-text { color: #666; font-size: 14px; }
  </style>

    function renderAgents(filteredAgents) {
      const grid = document.getElementById('agents-grid');
      grid.innerHTML = '';

      filteredAgents.forEach(agent => {
        const card = document.createElement('div');
        card.className = 'agent-card';
        card.innerHTML = `
          <div class="agent-name">${agent.name}</div>
          <div class="agent-category">${agent.category}</div>
          <div class="agent-description">${agent.description}</div>
          <div class="agent-stats">
            <div class="stat">
              <div class="stat-value market-cap">$${(agent.market_cap / 1000000).toFixed(1)}M</div>
              <div class="stat-label">Market Cap</div>
            </div>
            <div class="stat">
              <div class="stat-value">${agent.token_symbol}</div>
              <div class="stat-label">Token</div>
            </div>
            <div class="stat">
              <div class="stat-value">${agent.capabilities.length}</div>
              <div class="stat-label">Capabilities</div>
            </div>
          </div>
          <a href="agents/${agent.id}.md" class="view-profile">View Profile →</a>
        `;
        grid.appendChild(card);
      });

      document.getElementById('total-agents').textContent = filteredAgents.length;
    }

    function updateStats() {
      const totalCap = agents.reduce((sum, a) => sum + a.market_cap, 0);
      const categories = new Set(agents.map(a => a.category)).size;
      document.getElementById('total-cap').textContent = '$' + (totalCap / 1000000).toFixed(0) + 'M';
      document.getElementById('categories').textContent = categories;
    }

    function filterAgents(category, search) {
      return agents.filter(agent => {
        const matchCategory = category === 'all' || agent.category === category;
        const matchSearch = !search || 
          agent.name.toLowerCase().includes(search.toLowerCase()) ||
          agent.description.toLowerCase().includes(search.toLowerCase()) ||
          agent.capabilities.some(c => c.toLowerCase().includes(search.toLowerCase()));
        return matchCategory && matchSearch;
      });
    }

    // Event listeners
    document.getElementById('search').addEventListener('input', e => {
      const activeCategory = document.querySelector('.filter-btn.active').dataset.category;
      const filtered = filterAgents(activeCategory, e.target.value);
      renderAgents(filtered);
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        const search = document.getElementById('search').value;
        const filtered = filterAgents(e.target.dataset.category, search);
        renderAgents(filtered);
      });
    });

    // Initialize
    updateStats();
    renderAgents(agents);
